name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Create Cloudflare Pages project if not exists
        run: npx wrangler pages project create sebastianweszler-com --production-branch main || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Add custom domain sebastianweszler.com via API
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/sebastianweszler-com/domains" 
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" 
            -H "Content-Type: application/json" 
            -d '{"name":"sebastianweszler.com"}' | jq '.success, .errors'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Get Cloudflare zone for sebastianweszler.com
        id: zone
        run: |
          ZONE_ID=$(curl -s "https://api.cloudflare.com/client/v4/zones?name=sebastianweszler.com" 
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" 
            -H "Content-Type: application/json" | jq -r '.result[0].id // empty')
          echo "zone_id=$ZONE_ID" >> $GITHUB_OUTPUT
          echo "Zone ID: $ZONE_ID"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Upsert DNS for sebastianweszler.com -> Cloudflare Pages
        run: |
          ZONE_ID="${{ steps.zone.outputs.zone_id }}"
          if [ -z "$ZONE_ID" ]; then echo "No zone found"; exit 0; fi

          # Delete existing A/AAAA records at apex that conflict with CNAME
          for rtype in A AAAA; do
            for rid in $(curl -s "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?type=$rtype&name=sebastianweszler.com" 
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" | jq -r '.result[].id'); do
              echo "Deleting $rtype record $rid"
              curl -s -X DELETE "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$rid" 
                -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN"
            done
          done

          # Upsert CNAME
          RECORD_ID=$(curl -s "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?type=CNAME&name=sebastianweszler.com" 
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" | jq -r '.result[0].id // empty')

          if [ -n "$RECORD_ID" ]; then
            echo "Updating existing CNAME record $RECORD_ID"
            curl -s -X PATCH "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$RECORD_ID" 
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" 
              -H "Content-Type: application/json" 
              -d '{"type":"CNAME","name":"sebastianweszler.com","content":"sebastianweszler-com.pages.dev","proxied":true}' | jq '.success, .errors'
          else
            echo "Creating CNAME record to Cloudflare Pages"
            curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" 
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" 
              -H "Content-Type: application/json" 
              -d '{"type":"CNAME","name":"sebastianweszler.com","content":"sebastianweszler-com.pages.dev","proxied":true}' | jq '.success, .errors'
          fi

          # Also add www subdomain
          WWW_ID=$(curl -s "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?type=CNAME&name=www.sebastianweszler.com" 
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" | jq -r '.result[0].id // empty')
          if [ -n "$WWW_ID" ]; then
            curl -s -X PATCH "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$WWW_ID" 
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" 
              -H "Content-Type: application/json" 
              -d '{"type":"CNAME","name":"www.sebastianweszler.com","content":"sebastianweszler-com.pages.dev","proxied":true}' | jq '.success'
          else
            curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" 
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" 
              -H "Content-Type: application/json" 
              -d '{"type":"CNAME","name":"www.sebastianweszler.com","content":"sebastianweszler-com.pages.dev","proxied":true}' | jq '.success'
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=sebastianweszler-com

      - run: npx playwright install --with-deps chromium
      - name: E2E Tests
        run: node tests/e2e.mjs
        env:
          BASE_URL: https://sebastianweszler-com.pages.dev/
